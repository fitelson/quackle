name: QuackleScrabble
options:
  bundleIdPrefix: com.bef
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true
  generateSchemes: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    CLANG_CXX_LIBRARY: libc++
    GCC_PREPROCESSOR_DEFINITIONS:
      - QUACKLE_DATAMANAGER_ACCESS=1

targets:
  QuackleScrabble:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: QuackleScrabble
        type: group
        excludes:
          - LaunchScreen.storyboard
      - path: libquackle
        type: group
        compilerFlags:
          - "-std=c++17"
          - "-Wno-deprecated"
          - "-Wno-format-security"
          - "-Wno-unused-variable"
          - "-Wno-unreachable-code"
      - path: data
        type: folder
        buildPhase: resources
    dependencies:
      - sdk: GameKit.framework
    entitlements:
      path: QuackleScrabble/QuackleScrabble.entitlements
      properties:
        com.apple.developer.game-center: true
    settings:
      base:
        INFOPLIST_FILE: QuackleScrabble/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bef.quacklescrabble
        PRODUCT_NAME: Scrabble
        DEVELOPMENT_TEAM: Y9X24NP2Y3
        SWIFT_OBJC_BRIDGING_HEADER: QuackleScrabble-Bridging-Header.h
        CODE_SIGN_ENTITLEMENTS: QuackleScrabble/QuackleScrabble.entitlements
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/libquackle
          - $(SRCROOT)/QuackleScrabble/Bridge
        USER_HEADER_SEARCH_PATHS:
          - $(SRCROOT)/libquackle
        CLANG_CXX_LANGUAGE_STANDARD: c++17
      configs:
        debug:
          TARGETED_DEVICE_FAMILY: "1"
        release:
          TARGETED_DEVICE_FAMILY: "1"
